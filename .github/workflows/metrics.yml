name: Metrics
on:
  schedule:
    - cron: '0 18 * * *'          # 매일 03:00 JST
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write                 # SVG 커밋 허용

jobs:
  metrics:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'  # 무한 커밋 루프 방지
    steps:
      - name: metrics2
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user:  SeungyeonHwang
          filename: metrics2.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Tokyo
          config_twemoji: yes
          commits_authoring: syhwang.web@gmail.com, SeungyeonHwang
          # --- 핵심 플러그인 ---
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_habits: no                      # 최근 활동 의존 + 업스트림 버그로 비활성화
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year # 잔디 달력 1년치
          plugin_repositories: yes
          plugin_topics: yes
          plugin_followup: yes                   # 이슈/PR 처리 현황
          optimize: css               # SVG 용량 최적화
